name: CMake CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ${{ matrix.os }}

    strategy:
      fail-fast: false

      matrix:
        include:
          # GCC Debug
          - os: ubuntu-24.04
            build_type: Debug
            cc: gcc
            cxx: g++

          # GCC Release
          - os: ubuntu-24.04
            build_type: Release
            cc: gcc
            cxx: g++

          # Clang Debug
          - os: ubuntu-24.04
            build_type: Debug
            cc: clang
            cxx: clang++

          # Clang Release
          - os: ubuntu-24.04
            build_type: Release
            cc: clang
            cxx: clang++

    env:
      CC: ${{ matrix.cc }}
      CXX: ${{ matrix.cxx }}

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      with:
        submodules: recursive
        fetch-depth: 0

    - name: Install dependencies
      run: |
        sudo apt update

        sudo apt install -y \
          wget \
          gnupg \
          software-properties-common \
          cmake \
          ninja-build \
          build-essential \
          clang \
          libglfw3-dev \
          xorg-dev \
          libwayland-dev \
          libxkbcommon-dev \
          wayland-protocols

        sudo apt update

    - name: Install Vulkan SDK (Direct APT)
      run: |
        # Add LunarG Vulkan SDK repo (using 'noble' for Ubuntu 24.04)
        wget -qO- https://packages.lunarg.com/lunarg-signing-key-pub.asc | \
          sudo gpg --dearmor -o /usr/share/keyrings/lunarg.gpg
        
        echo "deb [signed-by=/usr/share/keyrings/lunarg.gpg] https://packages.lunarg.com/vulkan noble main" | \
          sudo tee /etc/apt/sources.list.d/lunarg-vulkan.list
        
        sudo apt update
        sudo apt install -y vulkan-sdk

    - name: Verify Vulkan tools
      run: |
        which glslc
        glslc --version
        vulkaninfo --summary || true

    - name: Configure CMake
      run: |
        cmake -B build \
          -G "Unix Makefiles" \
          -DCMAKE_BUILD_TYPE=${{ matrix.build_type }} \
          -DBUILD_ENV=GitWorkflow \
          -S .

    - name: Build
      run: |
        cmake --build build

    - name: List build output
      run: |
        ls -R build
