name: CMake CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ${{ matrix.os }}

    strategy:
      fail-fast: false

      matrix:
        include:
          - os: ubuntu-latest
            build_type: Debug
            cc: gcc
            cxx: g++

          - os: ubuntu-latest
            build_type: Release
            cc: gcc
            cxx: g++

          - os: ubuntu-latest
            build_type: Debug
            cc: clang
            cxx: clang++

          - os: ubuntu-latest
            build_type: Release
            cc: clang
            cxx: clang++

    env:
      CC: ${{ matrix.cc }}
      CXX: ${{ matrix.cxx }}

    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Install dependencies
      run: |
        sudo apt update

        sudo apt install -y \
          cmake \
          ninja-build \
          libglfw3-dev \
          libvulkan-dev \
          vulkan-tools \
          glslang-tools \
          xorg-dev

    - name: Configure
      run: |
        cmake -B build \
          -G Ninja \
          -DCMAKE_BUILD_TYPE=${{ matrix.build_type }} \
          -S .

    - name: Build
      run: |
        cmake --build build